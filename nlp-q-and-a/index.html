<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q&A Text Classifier</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Q&A Text Search using BERT</h1>

<div class="panel">

  <!-- LEFT: Context -->
  <div class="col">
    <h2>1. Add Context</h2>
    <textarea id="context"></textarea>
  </div>

  <!-- RIGHT: Controls -->
  <div class="col">

    <div id="status">Model loading...</div>

    <h2>2. Ask a Question</h2>
    <input type="text" id="question" placeholder="Type your question..." />

    <button id="askBtn" disabled>Search</button>

    <h2>3. View Answers</h2>
    <div id="answer"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/qna"></script>
<script src="script.js"></script>

</body>
</html>
