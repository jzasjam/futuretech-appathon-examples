<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pose Classifier</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Pose Classifier using BlazePose</h1>

    <div class="panel">

        <!-- LEFT: Camera -->
        <div class="col">
            <div class="camView">
                <video id="video" autoplay muted width="640" height="480"></video>
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <!-- RIGHT: Controls -->
        <div class="col">
            <div id="status">Model loading...</div>

            <h2>1. Start Camera</h2>
            <button id="startBtn" disabled>Start Camera</button>

            <h2>2. Save Samples For Training</h2>
            <p>Pose and click to collect training data</p>

            <button data-label="LeftArm" class="sampleBtn" disabled>Add 'LeftArm' Samples (0)</button>
            <button data-label="RightArm" class="sampleBtn" disabled>Add 'RightArm' Samples (0)</button>
            <button data-label="BothArms" class="sampleBtn" disabled>Add 'BothArms' Samples (0)</button>

            <h2>3. Train / Save / Load A Model</h2>
            <button id="trainBtn" disabled>Train & Predict</button>
            <button id="saveBtn" disabled>Save</button>
            <button id="loadBtn" disabled>Load</button>
            <button id="resetBtn">Reset</button>
        </div>

    </div>

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <script src="script.js"></script>
</body>

</html>
